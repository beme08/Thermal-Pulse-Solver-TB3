schema_version = "1.0"

artifacts = ["/app/"]

[metadata]
author_name = "Shkumbin Sherifi"
author_email = "beme08@users.noreply.github.com"
category = "scientific-computing"
tags = ["heat-equation", "adi", "finite-difference", "oracle", "pde"]
expert_time_estimate_hours = 4
relevant_experience = "Experience with numerical PDE solvers, finite-difference/finite-volume discretizations, private-oracle tasks, and benchmark hardening."
difficulty_explanation = """
The task requires solving a transient two-dimensional heat equation from a
black-box oracle. Public examples are intentionally insufficient to determine
the time scale. The grader evaluates three deterministic private
instances inside one grading run, so efficient per-instance temporal
resolution selection and a stable 2D implicit method matter under the shared
wall-clock budget.
"""
verification_explanation = """
Separate-grading mode. The grader compiles the submitted /app/solution.cpp
against a trusted oracle restored in a private build directory, then evaluates
three deterministic private thermal instances under one shared grading timeout.
Private scoring data lives only in the grading container. The agent-visible
/app contains only the public oracle declarations and starter solution skeleton.
"""

[verifier]
timeout_sec = 180.0
environment_mode = "separate"

[agent]
timeout_sec = 5400.0

[environment]
build_timeout_sec = 600.0
cpus = 2
memory_mb = 4000
storage_mb = 10240
gpus = 0

# Internet is allowed so Harbor can install the agent harness during setup.
# Benchmark isolation comes from separate-grading mode and private scoring data,
# not from breaking package-manager setup.
allow_internet = true
network_mode = "public"
